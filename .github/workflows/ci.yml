name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # build before check: eslint's strictTypeChecked rules resolve
      # @withqwerty/campos-* imports through each package's dist/*.d.ts.
      # Without a prior build, dist/ is empty and every workspace import
      # resolves to `unknown`, cascading 1000+ no-unsafe-* lint errors in
      # apps/site. scripts/check.sh builds in the same order locally.
      - run: pnpm build
      - run: pnpm check
      - run: pnpm verify:package-imports
      - run: pnpm --filter @withqwerty/campos-site build
